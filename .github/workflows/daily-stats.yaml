name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *' # every day at midnight UTC
  workflow_dispatch:      # allows to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # allows the bot to push the CSV back to repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Install Poetry
        run: poetry lock --no-update

      - name: Install Dependencies
        run: poetry add PyGithub pandas plotly
        
      - name: Install dependencies
        run:  poetry install

      - name: Run Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Use the built-in token
        run: poetry run python repostats.py --fetch --clones --backup

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic_history.csv
          git commit -m "Update daily stats" || echo "No changes to commit"
          git push