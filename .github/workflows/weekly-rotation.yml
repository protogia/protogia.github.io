name: Weekly CSS Rotation

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CSS_VAR_PATH: "../static/css/variables.css"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          export PATH="$HOME/.local/bin:$PATH"

      - name: Lock dependencies
        working-directory: ./css-rotator
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry lock

      - name: Install dependencies
        working-directory: ./css-rotator
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry install --no-root

      - name: Run script
        working-directory: ./css-rotator
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry run python __main__.py
      - name: Update submodule reference  
        run: |    
          git add css-rotator
      
      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Auto-update: CSS rotated" || echo "No changes to commit"
          git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Trigger Hugo build
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \      
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \      
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/hugo.yaml/dispatches \      
            -d '{"ref":"main"}'

