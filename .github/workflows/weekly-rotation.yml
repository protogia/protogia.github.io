name: Weekly CSS Rotation

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      CSS_VAR_PATH: "../themes/formula1/static/css/variables.css" # CHANGE 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run rotator script
        run: python css-rotator/__main__.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@://github.com'
          git add .
          git commit -m "Auto-update: CSS rotated" || echo "No changes to commit"
          git push
